<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="box">

    <h1>Register</h1>

    <form action="/register" method="post">

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <input type="email"
               name="email"
               placeholder="Enter Email"
               required>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        Already have account?
        <a href="/">
            Login
        </a>
    </p>

</div>

</body>
</html>
